<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Planet body -->
  <circle cx="150" cy="150" r="80" fill="#4169E1"/>
  
  <!-- Planet rings -->
  <ellipse cx="150" cy="150" rx="110" ry="30" fill="none" stroke="#DAA520" stroke-width="8"/>
  
  <!-- Planet surface details (continents) -->
  <circle cx="130" cy="120" r="15" fill="#228B22"/>
  <circle cx="170" cy="140" r="20" fill="#228B22"/>
  <circle cx="150" cy="170" r="12" fill="#228B22"/>
  
  <!-- Clouds/Atmosphere -->
  <ellipse cx="120" cy="100" rx="25" ry="15" fill="#87CEEB" opacity="0.6"/>
  <ellipse cx="180" cy="180" rx="30" ry="12" fill="#87CEEB" opacity="0.6"/>
  
  <!-- Stars around planet -->
  <circle cx="40" cy="50" r="3" fill="#FFD700"/>
  <circle cx="260" cy="80" r="2" fill="#FFD700"/>
  <circle cx="50" cy="250" r="2" fill="#FFD700"/>
  <circle cx="250" cy="240" r="3" fill="#FFD700"/>
</svg>