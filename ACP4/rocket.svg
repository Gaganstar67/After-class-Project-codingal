<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Rocket body -->
  <rect x="100" y="50" width="100" height="150" fill="#FF6B6B" rx="10"/>
  
  <!-- Rocket window -->
  <circle cx="150" cy="80" r="20" fill="#87CEEB"/>
  
  <!-- Rocket fins -->
  <polygon points="100,180 80,220 100,210" fill="#FFA500"/>
  <polygon points="200,180 220,220 200,210" fill="#FFA500"/>
  
  <!-- Rocket flames -->
  <polygon points="120,200 130,240 140,200" fill="#FF4500"/>
  <polygon points="160,200 170,240 180,200" fill="#FFD700"/>
  <polygon points="140,210 150,250 160,210" fill="#FF6347"/>
  
  <!-- Stars -->
  <circle cx="50" cy="30" r="3" fill="#FFD700"/>
  <circle cx="250" cy="50" r="3" fill="#FFD700"/>
  <circle cx="280" cy="100" r="2" fill="#FFD700"/>
</svg>